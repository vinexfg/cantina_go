name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # a cada 10 minutos

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cantina-go-415n.onrender.com/api)
          echo "Status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Backend retornou status inesperado: $STATUS"
            exit 1
          fi
